<mat-card class="project-card" [attr.aria-label]="'Project: ' + project.name">
  <mat-card-header>
    <mat-card-title>{{ project.name }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <p class="description">{{ project.description || 'No description' }}</p>
    <mat-chip-set class="badges" aria-label="Project properties">
      <mat-chip [class]="project.state === 'wellFormed' ? 'chip-green' : 'chip-grey'">
        {{ project.state }}
      </mat-chip>
      <mat-chip [class]="project.visibility === 'public' ? 'chip-blue' : 'chip-orange'">
        {{ project.visibility }}
      </mat-chip>
    </mat-chip-set>
  </mat-card-content>

  <mat-card-actions>
    <a
        mat-button
        [href]="project.url"
        target="_blank"
        rel="noopener noreferrer"
        [attr.aria-label]="'Open ' + project.name + ' in Azure DevOps'"
    >
        Open in Azure DevOps
    </a>
  </mat-card-actions>
</mat-card>
